<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Markdown Viewer v1.3</title>
<meta name="version" content="1.3">
<script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}

header {
  background: #1a1a2e;
  color: #eee;
  padding: 8px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  min-height: 44px;
}

header h1 { font-size: 16px; font-weight: 600; }

.tabs {
  display: flex;
  gap: 0;
  flex-shrink: 0;
  background: #16213e;
}

.tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-size: 14px;
  font-weight: 500;
  color: #aaa;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
}

.tab.active {
  color: #4fc3f7;
  border-bottom-color: #4fc3f7;
  background: rgba(79, 195, 247, 0.05);
}

.pane {
  flex: 1;
  overflow: hidden;
  display: none;
}

.pane.active { display: flex; flex-direction: column; }

#editor {
  flex: 1;
  width: 100%;
  padding: 16px;
  border: none;
  outline: none;
  resize: none;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 14px;
  line-height: 1.6;
  background: #0f0f23;
  color: #e0e0e0;
  tab-size: 2;
}

#preview {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  background: #fff;
  color: #333;
  line-height: 1.7;
  overflow-wrap: anywhere;
  word-break: break-word;
}

#preview h1 { font-size: 1.8em; margin: 0.8em 0 0.4em; border-bottom: 1px solid #eee; padding-bottom: 0.3em; }
#preview h2 { font-size: 1.5em; margin: 0.7em 0 0.35em; border-bottom: 1px solid #eee; padding-bottom: 0.25em; }
#preview h3 { font-size: 1.25em; margin: 0.6em 0 0.3em; }
#preview h4, #preview h5, #preview h6 { margin: 0.5em 0 0.25em; }
#preview p { margin: 0.5em 0; }
#preview a { color: #1976d2; }
#preview img { max-width: 100%; height: auto; border-radius: 4px; }
#preview code {
  background: #f5f5f5;
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 0.9em;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  overflow-wrap: anywhere;
  word-break: break-word;
  white-space: pre-wrap;
}
#preview pre {
  background: #1e1e1e;
  color: #d4d4d4;
  padding: 12px;
  border-radius: 6px;
  overflow-x: auto;
  margin: 0.8em 0;
}
@media (max-width: 520px) {
  #preview pre { overflow-x: hidden; }
}
#preview pre code {
  background: none;
  padding: 0;
  color: inherit;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  word-break: break-word;
}
#preview blockquote {
  border-left: 4px solid #4fc3f7;
  padding: 8px 16px;
  margin: 0.8em 0;
  background: #f8f9fa;
  color: #555;
}
#preview ul, #preview ol { padding-left: 1.5em; margin: 0.5em 0; }
#preview li { margin: 0.25em 0; }
#preview table { border-collapse: collapse; width: 100%; margin: 0.8em 0; }
#preview th, #preview td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
#preview th { background: #f5f5f5; font-weight: 600; }
#preview hr { border: none; border-top: 1px solid #ddd; margin: 1.2em 0; }
#preview input[type="checkbox"] { margin-right: 6px; }

@media (min-width: 768px) {
  .tabs { display: none; }
  .pane { display: flex !important; }
  .editor-pane { width: 50%; border-right: 1px solid #333; }
  .preview-pane { width: 50%; }
  .panes { display: flex; flex: 1; overflow: hidden; }
  .pane { flex: none; height: 100%; }
}

@media (prefers-color-scheme: dark) {
  #preview { background: #1a1a2e; color: #e0e0e0; }
  #preview h1, #preview h2 { border-color: #333; }
  #preview code { background: #2a2a4a; }
  #preview blockquote { background: #2a2a4a; color: #bbb; }
  #preview th { background: #2a2a4a; }
  #preview th, #preview td { border-color: #444; }
  #preview hr { border-color: #444; }
  #preview a { color: #4fc3f7; }
}

.btn {
  background: rgba(255,255,255,0.1);
  border: none;
  color: #eee;
  padding: 6px 12px;
  border-radius: 4px;
  font-size: 13px;
  cursor: pointer;
}
.btn:active { background: rgba(255,255,255,0.2); }

.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(255,255,255,0.15);
  border: none;
  color: #ccc;
  padding: 4px 8px;
  border-radius: 3px;
  font-size: 12px;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.2s;
}
pre:hover .copy-btn { opacity: 1; }
/* 觸控裝置沒有 hover，直接顯示複製按鈕 */
@media (hover: none) {
  .copy-btn { opacity: 1; }
}
.copy-btn:active { background: rgba(255,255,255,0.3); }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>📝 MD Viewer <small style="font-size:12px;color:#888">v1.3</small></h1>
    <div style="display:flex;gap:8px">
      <button class="btn" id="exportBtn">匯出</button>
      <button class="btn" id="clearBtn">清除</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-pane="editor">✏️ 編輯</button>
    <button class="tab" data-pane="preview">👁 預覽</button>
  </div>

  <div class="panes">
    <div class="pane editor-pane active" id="editor-pane">
      <textarea id="editor" placeholder="在這裡輸入 Markdown..." spellcheck="false"></textarea>
    </div>
    <div class="pane preview-pane" id="preview-pane">
      <div id="preview"></div>
    </div>
  </div>
</div>

<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
let debounceTimer;

// marked v4 API — 鎖定版本 4.3.0，避免 v5+ 移除 highlight option 導致失效
marked.setOptions({
  breaks: true,
  gfm: true,
  headerIds: false,
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  }
});

function render() {
  preview.innerHTML = marked.parse(editor.value);
  preview.querySelectorAll('pre').forEach(pre => {
    if (pre.querySelector('.copy-btn')) return;
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = '複製';
    btn.addEventListener('click', () => {
      const code = pre.querySelector('code');
      navigator.clipboard.writeText(code ? code.textContent : pre.textContent)
        .then(() => {
          btn.textContent = '已複製!';
          setTimeout(() => { btn.textContent = '複製'; }, 1500);
        })
        .catch(() => {
          btn.textContent = '失敗';
          setTimeout(() => { btn.textContent = '複製'; }, 1500);
        });
    });
    pre.style.position = 'relative';
    pre.appendChild(btn);
  });
  try {
    localStorage.setItem('md-content', editor.value);
  } catch { /* QuotaExceededError */ }
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.pane === name));
  document.getElementById('editor-pane').classList.toggle('active', name === 'editor');
  document.getElementById('preview-pane').classList.toggle('active', name === 'preview');
}

function clearAll() {
  if (editor.value && !confirm('確定清除？')) return;
  editor.value = '';
  render();
  try { localStorage.removeItem('md-content'); } catch {}
}

function exportHtml() {
  const html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width"><title>Markdown Export</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css"><style>body{max-width:800px;margin:40px auto;padding:0 20px;font-family:-apple-system,sans-serif;line-height:1.7;color:#333}h1,h2{border-bottom:1px solid #eee;padding-bottom:.3em}pre{background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:6px;overflow-x:auto}code{background:#f5f5f5;padding:2px 6px;border-radius:3px;font-size:.9em}pre code{background:none;padding:0}blockquote{border-left:4px solid #4fc3f7;padding:8px 16px;background:#f8f9fa}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:8px 12px}th{background:#f5f5f5}img{max-width:100%}a{color:#1976d2}</style></head><body>' + preview.innerHTML + '</body></html>';
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'markdown-export.html';
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 10000);
}

// Tab 鍵插入兩個空格
editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + 2;
    render();
  }
});

// 即時預覽 debounce
editor.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(render, 150);
});

// Tab 切換
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab.dataset.pane));
});

document.getElementById('exportBtn').addEventListener('click', exportHtml);
document.getElementById('clearBtn').addEventListener('click', clearAll);

// 載入已存內容
const saved = localStorage.getItem('md-content');
if (saved) editor.value = saved;
render();
</script>
</body>
</html>
